baseURL = 'https://example.org/'
locale = 'en-us'
title = 'Riibaisu'
theme = 'digio-theme'

[markup.goldmark.renderer]
  hardWraps = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderHooks]
      [markup.goldmark.renderHooks.link]
        useEmbedded = 'auto'

  
[menus]
  [[menus.main]]
    name = 'home'
    pageRef = '/'
    weight = 1
    [menus.main.params]
      image = '/home_icon.png'

  [[menus.main]]
    name = 'projects'
    pageRef = '/projects'
    weight = 2

  [[menus.main]]
    name = 'blog'
    pageRef = '/blog'
    weight = 3

  [[menus.main]]
    name = 'me'
    pageRef = '/me'
    weight = 4    
  
  [[menus.main]]
    name = 'socials'
    pageRef = '/socials'
    weight = 5

[module]
  [module.hugoVersion]
    extended = false
    min = '0.146.0'
